<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gold gradients -->
    <radialGradient id="gold-radial" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="25%" stop-color="#fde047" />
      <stop offset="60%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#854d0e" />
    </radialGradient>
    <linearGradient id="gold-linear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#713f12" />
    </linearGradient>
    <!-- Soft shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  
  <!-- Outer Glow / Background -->
  <circle cx="256" cy="256" r="230" fill="url(#gold-radial)" filter="url(#shadow)" />
  
  <!-- Soccer Ball Pentagons and Lines -->
  <!-- Center pentagon -->
  <polygon points="256,170 316,214 293,284 219,284 196,214" fill="#0f172a" stroke="url(#gold-linear)" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Lines going outward from center pentagon vertices -->
  <line x1="256" y1="170" x2="256" y2="70" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <line x1="316" y1="214" x2="406" y2="185" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <line x1="293" y1="284" x2="349" y2="361" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <line x1="219" y1="284" x2="163" y2="361" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />
  <line x1="196" y1="214" x2="106" y2="185" stroke="#0f172a" stroke-width="8" stroke-linecap="round" />

  <!-- Outer pentagons (truncated/visible portions) -->
  <!-- Top outer -->
  <polygon points="256,70 200,30 312,30" fill="#0f172a" stroke="url(#gold-linear)" stroke-width="6" stroke-linejoin="round" />
  <!-- Top Right outer -->
  <polygon points="406,185 460,135 440,240" fill="#0f172a" stroke="url(#gold-linear)" stroke-width="6" stroke-linejoin="round" />
  <!-- Bottom Right outer -->
  <polygon points="349,361 410,410 300,450" fill="#0f172a" stroke="url(#gold-linear)" stroke-width="6" stroke-linejoin="round" />
  <!-- Bottom Left outer -->
  <polygon points="163,361 102,410 212,450" fill="#0f172a" stroke="url(#gold-linear)" stroke-width="6" stroke-linejoin="round" />
  <!-- Top Left outer -->
  <polygon points="106,185 52,135 72,240" fill="#0f172a" stroke="url(#gold-linear)" stroke-width="6" stroke-linejoin="round" />

  <!-- Inner seams linking outer pentagons -->
  <path d="M256,70 L345,135 L406,185 M440,240 L380,310 L349,361 M300,450 L256,390 L212,450 M163,361 L132,310 L72,240 M106,185 L167,135 L256,70" fill="none" stroke="#0f172a" stroke-width="8" />

  <!-- Shiny overlay highlight -->
  <path d="M70,150 C120,70 220,50 320,60 C240,65 150,110 100,200 C85,180 75,165 70,150 Z" fill="#ffffff" opacity="0.15" />
</svg>